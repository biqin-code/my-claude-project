<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可爱贪食蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffb6c1 0%, #ffc0cb 50%, #ffb7c5 100%);
            font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif;
        }

        h1 {
            color: #c71585;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
        }

        .game-container {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        canvas {
            display: block;
            border-radius: 15px;
            background: #fff0f5;
            box-shadow: inset 0 0 20px rgba(199, 21, 133, 0.1);
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 10px 20px;
            background: rgba(199, 21, 133, 0.1);
            border-radius: 10px;
        }

        .score {
            font-size: 1.3rem;
            color: #c71585;
            font-weight: bold;
        }

        .controls {
            margin-top: 15px;
            color: #c71585;
            font-size: 0.9rem;
            text-align: center;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-over-box {
            background: linear-gradient(135deg, #ffb6c1 0%, #ffc0cb 100%);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .game-over-box h2 {
            color: #c71585;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .game-over-box p {
            color: #8b008b;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .start-btn,
        .restart-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        .start-btn:hover,
        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .start-box {
            margin-top: 15px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            text-align: center;
        }

        .start-box h3 {
            color: #c71585;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .start-box .tips {
            color: #8b008b;
            font-size: 0.9rem;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .start-box .snake-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>🐍 可爱贪食蛇 🐍</h1>

    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="score-board">
            <span class="score">得分: <span id="score">0</span></span>
            <span class="score">长度: <span id="length">3</span></span>
        </div>

        <div class="start-box" id="startBox">
            <div class="snake-icon">🐍</div>
            <h3>可爱贪食蛇</h3>
            <p class="tips">
                使用 ↑ ↓ ← → 或 W A S D 控制方向<br>
                吃香蕉得分，蛇身变长<br>
                不要撞到墙壁或自己的身体哦！
            </p>
            <button class="start-btn" onclick="startGame()">开始游戏</button>
        </div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-box">
            <h2>游戏结束!</h2>
            <p>你的得分: <span id="finalScore">0</span></p>
            <button class="restart-btn" onclick="restartGame()">再来一局</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameRunning = false;
        let gameStarted = false;
        let gameSpeed = 150;
        let foodEaten = 0;

        // 初始化游戏
        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            foodEaten = 0;
            gameSpeed = 150;
            gameRunning = false;
            placeFood();
            updateScore();
            document.getElementById('gameOverOverlay').style.display = 'none';
        }

        // 开始游戏
        function startGame() {
            gameStarted = true;
            gameRunning = true;
            document.getElementById('startBox').style.display = 'none';
            gameLoop();
        }

        // 放置食物
        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (isOnSnake(food.x, food.y));
        }

        // 检查位置是否在蛇身上
        function isOnSnake(x, y) {
            return snake.some(segment => segment.x === x && segment.y === y);
        }

        // 绘制圆角矩形
        function drawRoundedRect(x, y, width, height, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(x, y, width, height, radius);
            ctx.fill();
        }

        // 绘制蛇头（带可爱表情）
        function drawSnakeHead(x, y) {
            const padding = 1;
            const size = gridSize - padding * 2;

            // 头部主体 - 红色
            drawRoundedRect(x + padding, y + padding, size, size, 8, '#e74c3c');

            // 头部高光
            ctx.fillStyle = '#c0392b';
            ctx.beginPath();
            ctx.roundRect(x + padding + 2, y + padding + 2, size - 4, size / 2 - 2, 6);
            ctx.fill();

            // 眼睛白色部分
            const eyeY = y + gridSize / 2 - 2;
            const eyeSize = 5;

            // 左眼
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(x + gridSize / 2 - 4, eyeY, eyeSize, 0, Math.PI * 2);
            ctx.fill();

            // 右眼
            ctx.beginPath();
            ctx.arc(x + gridSize / 2 + 4, eyeY, eyeSize, 0, Math.PI * 2);
            ctx.fill();

            // 眼睛黑色瞳孔 - 根据方向转动
            ctx.fillStyle = '#2c3e50';
            const pupilOffsetX = direction.x * 1.5;
            const pupilOffsetY = direction.y * 1.5;

            ctx.beginPath();
            ctx.arc(x + gridSize / 2 - 4 + pupilOffsetX, eyeY + pupilOffsetY, 2.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(x + gridSize / 2 + 4 + pupilOffsetX, eyeY + pupilOffsetY, 2.5, 0, Math.PI * 2);
            ctx.fill();

            // 腮红
            ctx.fillStyle = 'rgba(255, 150, 150, 0.6)';
            ctx.beginPath();
            ctx.ellipse(x + 4, y + gridSize - 6, 3, 2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + gridSize - 4, y + gridSize - 6, 3, 2, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制蛇身体
        function drawSnakeBody(x, y, index) {
            const padding = 1;
            const size = gridSize - padding * 2;

            // 身体主体 - 渐变红色
            const redIntensity = Math.max(180, 231 - index * 3);
            const bodyColor = `rgb(${redIntensity}, ${Math.max(60, 76 - index * 2)}, ${Math.max(50, 60 - index * 2)})`;
            drawRoundedRect(x + padding, y + padding, size, size, 6, bodyColor);

            // 身体高光
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.1, 0.3 - index * 0.03)})`;
            ctx.beginPath();
            ctx.roundRect(x + padding + 2, y + padding + 2, size - 4, size / 2 - 2, 4);
            ctx.fill();
        }

        // 绘制食物（香蕉）
        function drawFood(x, y) {
            const centerX = x + gridSize / 2;
            const centerY = y + gridSize / 2;

            // 保存当前状态
            ctx.save();
            ctx.translate(centerX, centerY);

            // 旋转香蕉使其倾斜
            ctx.rotate(Math.PI / 6);

            // 香蕉主体 - 黄色
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.ellipse(0, 0, 9, 5, 0, 0, Math.PI * 2);
            ctx.fill();

            // 香蕉高光
            ctx.fillStyle = '#ffec8b';
            ctx.beginPath();
            ctx.ellipse(-2, -2, 5, 2, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // 香蕉两端 - 深黄色
            ctx.fillStyle = '#daa520';
            ctx.beginPath();
            ctx.ellipse(-8, 0, 2, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(8, 0, 2, 3, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // 绘制网格背景
        function drawBackground() {
            // 浅粉色背景
            ctx.fillStyle = '#fff0f5';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 网格线
            ctx.strokeStyle = 'rgba(199, 21, 133, 0.1)';
            ctx.lineWidth = 0.5;

            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        // 绘制游戏
        function draw() {
            drawBackground();

            // 绘制食物
            drawFood(food.x * gridSize, food.y * gridSize);

            // 绘制蛇身体（从尾到头，最后一节再画蛇头）
            for (let i = snake.length - 1; i >= 0; i--) {
                if (i === 0) {
                    drawSnakeHead(snake[i].x * gridSize, snake[i].y * gridSize);
                } else {
                    drawSnakeBody(snake[i].x * gridSize, snake[i].y * gridSize, i);
                }
            }
        }

        // 更新分数显示
        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
        }

        // 游戏逻辑更新
        function update() {
            if (!gameRunning) return;

            direction = nextDirection;

            // 计算新的头部位置
            const newHead = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 检查碰撞 - 墙壁
            if (newHead.x < 0 || newHead.x >= tileCount || newHead.y < 0 || newHead.y >= tileCount) {
                gameOver();
                return;
            }

            // 检查碰撞 - 自身
            if (isOnSnake(newHead.x, newHead.y)) {
                gameOver();
                return;
            }

            // 添加新头部
            snake.unshift(newHead);

            // 检查是否吃到食物
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                foodEaten++;
                updateScore();
                placeFood();

                // 每吃5个食物加速
                if (foodEaten % 5 === 0 && gameSpeed > 80) {
                    gameSpeed -= 10;
                }
            } else {
                // 没吃到食物，移除尾部
                snake.pop();
            }
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').style.display = 'flex';
        }

        // 重新开始游戏
        function restartGame() {
            document.getElementById('gameOverOverlay').style.display = 'none';
            document.getElementById('startBox').style.display = 'block';
            initGame();
        }

        // 游戏主循环
        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                setTimeout(gameLoop, gameSpeed);
            }
        }

        // 键盘控制
        document.addEventListener('keydown', function(e) {
            // 防止方向键滚动页面
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    break;
                case ' ':
                    if (!gameRunning) {
                        restartGame();
                    }
                    break;
            }
        });

        // 启动游戏 - 等待用户点击开始按钮
        initGame();
        draw(); // 先绘制初始画面
    </script>
</body>
</html>
