<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>注册 - 王罡的财务管家</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#904568",
            "primary-container": "#ffb1d0",
            "on-primary": "#ffffff",
            "on-primary-container": "#833a5c",
            secondary: "#665b63",
            "secondary-container": "#eedee8",
            tertiary: "#6f5767",
            "tertiary-container": "#ddbfd2",
            surface: "#fff7fe",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#fbf0ff",
            "surface-container": "#f7e9fd",
            "surface-container-high": "#f1e4f7",
            "surface-container-highest": "#ebdef1",
            "surface-dim": "#e3d6e9",
            "on-surface": "#201926",
            "on-surface-variant": "#4f444a",
            background: "#fff7fe",
            catering: "#FF6B6B",
            transport: "#4ECDC4",
            shopping: "#FFE66D",
            entertainment: "#95E1D3",
            housing: "#F38181",
            medical: "#AA96DA",
            education: "#FCBAD3",
            others: "#A8D8EA",
            success: "#10B981",
            warning: "#F59E0B",
            error: "#ba1a1a",
            outline: "#81737a",
            "outline-variant": "#d3c2ca"
          },
          borderRadius: {
            DEFAULT: "1rem",
            lg: "2rem",
            xl: "3rem",
            full: "9999px"
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 overflow-hidden relative bg-gradient-to-br from-pink-50 via-purple-50 to-pink-50">
  <!-- 背景装饰 -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-24 -left-24 w-96 h-96 bg-pink-200/20 rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-purple-200/20 rounded-full blur-3xl"></div>
  </div>

  <main class="w-full max-w-md z-10">
    <div class="bg-surface-container-lowest rounded-2xl p-8 shadow-lg">
      <!-- Logo和标题 -->
      <div class="mb-6 flex flex-col items-center gap-3">
        <div class="w-20 h-20 rounded-full bg-pink-100 flex items-center justify-center text-5xl">🍀</div>
        <h1 class="text-2xl font-bold text-primary">王罡的财务管家</h1>
        <p class="text-sm text-secondary">开启您的财务成长之旅</p>
      </div>

      <!-- 注册表单 -->
      <form class="space-y-5" onsubmit="handleRegister(event)">
        <!-- 用户名 -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-on-surface-variant ml-3">用户名</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
            <input
              class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-2 border-transparent rounded-full text-base focus:border-primary-container focus:bg-white outline-none transition-all"
              id="username"
              placeholder="4-20位字符"
              type="text"
              required
              autocomplete="off"
            />
          </div>
        </div>

        <!-- 密码 -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-on-surface-variant ml-3">密码</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
            <input
              class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-2 border-transparent rounded-full text-base focus:border-primary-container focus:bg-white outline-none transition-all"
              id="password"
              placeholder="至少6位字符"
              type="password"
              required
              autocomplete="new-password"
            />
          </div>
        </div>

        <!-- 确认密码 -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-on-surface-variant ml-3">确认密码</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">verified_user</span>
            <input
              class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-2 border-transparent rounded-full text-base focus:border-primary-container focus:bg-white outline-none transition-all"
              id="confirmPassword"
              placeholder="请再次输入密码"
              type="password"
              required
              autocomplete="new-password"
            />
          </div>
        </div>

        <!-- 错误提示 -->
        <div id="errorMsg" class="text-error text-sm text-center hidden"></div>

        <!-- 注册按钮 -->
        <button
          id="submitBtn"
          type="submit"
          class="w-full bg-primary hover:brightness-105 active:scale-95 text-lg font-semibold py-4 rounded-full shadow-lg transition-all flex items-center justify-center gap-2 text-white"
        >
          立即注册
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </form>

      <!-- 登录入口 -->
      <div class="mt-6 text-center">
        <p class="text-sm text-on-surface-variant">
          已有账号？
          <a class="text-primary font-semibold hover:underline" href="login.html">返回登录</a>
        </p>
      </div>
    </div>
  </main>

  <script>
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function handleRegister(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');

      errorMsg.classList.add('hidden');

      // 验证用户名
      if (!/^[a-zA-Z0-9]{4,20}$/.test(username)) {
        showError('用户名需为4-20位字母或数字');
        return;
      }

      // 验证密码
      if (password.length < 6) {
        showError('密码需6位以上');
        return;
      }

      // 验证确认密码
      if (password !== confirmPassword) {
        showError('两次密码输入不一致');
        return;
      }

      // 禁用按钮
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="animate-spin">⏳</span> 注册中...';

      // 模拟注册延迟
      setTimeout(() => {
        // 获取已注册用户
        const users = JSON.parse(localStorage.getItem('finance_users') || '[]');

        // 检查用户名是否已存在
        if (users.some(u => u.username === username)) {
          showError('用户名已被注册');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '立即注册';
          return;
        }

        // 创建新用户
        const newUser = {
          id: Date.now(),
          username: username,
          password: password // 简化存储，实际项目应加密
        };

        users.push(newUser);
        localStorage.setItem('finance_users', JSON.stringify(users));

        alert('注册成功！请登录。');
        window.location.href = 'login.html';
      }, 500);
    }
  </script>
</body>
</html>
