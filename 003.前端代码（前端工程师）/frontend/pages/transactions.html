    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#904568",
            "primary-container": "#ffb1d0",
            "on-primary": "#ffffff",
            "on-primary-container": "#833a5c",
            secondary: "#665b63",
            "secondary-container": "#eedee8",
            tertiary: "#6f5767",
            "tertiary-container": "#ddbfd2",
            surface: "#fff7fe",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#fbf0ff",
            "surface-container": "#f7e9fd",
            "surface-container-high": "#f1e4f7",
            "surface-container-highest": "#ebdef1",
            "surface-dim": "#e3d6e9",
            "on-surface": "#201926",
            "on-surface-variant": "#4f444a",
            background: "#fff7fe",
            catering: "#FF6B6B",
            transport: "#4ECDC4",
            shopping: "#FFE66D",
            entertainment: "#95E1D3",
            housing: "#F38181",
            medical: "#AA96DA",
            education: "#FCBAD3",
            others: "#A8D8EA",
            success: "#10B981",
            warning: "#F59E0B",

          borderRadius: {
            DEFAULT: "1rem",
            lg: "2rem",

    }
  </script>

</head>

            <option value="">全部类型</option>

        <!-- 重置按钮 -->
        <button onclick="resetFilter()" class="text-sm text-primary hover:underline">清除筛选</button>
      </div>
    </div>

    <!-- 可滚动内容 -->

      <!-- 记录列表 -->
      <div id="recordsList" class="space-y-6">
        <div class="text-center py-8 text-on-surface-variant">加载中...</div>

    <!-- 分页 -->

      <!-- 动态生成分页 -->

    <a class="flex flex-col items-center bg-primary-container text-on-primary-container rounded-full px-6 py-1" href="transactions.html">

    </a>
    <a class="flex flex-col items-center text-on-surface-variant" href="settings.html">
      <span class="material-symbols-outlined">settings</span>
      <span class="text-xs font-medium">设置</span>
    </a>

  <!-- 移动端FAB -->
  <button class="md:hidden fixed bottom-20 right-6 w-14 h-14 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-xl z-50" onclick="showAddModal()">
    <span class="material-symbols-outlined">add</span>
  </button>

  <!-- 记一笔弹窗 -->
  <div id="addModal" class="fixed inset-0 z-[200] hidden">
    <div class="absolute inset-0 bg-black/50" onclick="hideAddModal()"></div>
    <div class="absolute bottom-0 left-0 right-0 bg-surface-container-lowest rounded-t-3xl p-6 max-w-md mx-auto max-h-[90vh] overflow-y-auto">
      <div class="w-10 h-1 bg-outline rounded-full mx-auto mb-4"></div>
      <h3 class="text-xl font-semibold text-center mb-6">记一笔</h3>

      <!-- 类型切换 -->
      <div class="flex gap-3 mb-6">
        <button id="tabExpense" class="flex-1 py-3 rounded-full font-semibold bg-primary text-on-primary transition-all" onclick="switchTab('expense')">支出</button>
        <button id="tabIncome" class="flex-1 py-3 rounded-full font-semibold bg-surface-container text-on-surface-variant transition-all" onclick="switchTab('income')">收入</button>
      </div>

      <!-- 金额输入 -->
      <div class="mb-6">
        <div class="flex items-center justify-center gap-2 text-4xl font-bold">
          <span class="text-on-surface-variant">¥</span>
          <input id="amountInput" type="number" step="0.01" placeholder="0.00" class="w-40 text-center bg-transparent outline-none text-on-surface">
        </div>
      </div>

      <!-- 分类选择 -->
      <div class="mb-6">
        <p class="text-sm text-on-surface-variant mb-3">选择分类</p>
        <div id="categoryGrid" class="grid grid-cols-4 gap-3">
          <!-- 动态生成 -->
        </div>
      </div>

      <!-- 支付方式 -->
      <div id="paymentSection" class="mb-6">
        <p class="text-sm text-on-surface-variant mb-3">支付方式</p>
        <div class="flex flex-wrap gap-2">
          <button class="payment-btn px-4 py-2 rounded-full bg-surface-container text-on-surface-variant text-sm transition-all" data-payment="支付宝" onclick="selectPayment(this, '支付宝')">支付宝</button>
          <button class="payment-btn px-4 py-2 rounded-full bg-surface-container text-on-surface-variant text-sm transition-all" data-payment="微信支付" onclick="selectPayment(this, '微信支付')">微信支付</button>
          <button class="payment-btn px-4 py-2 rounded-full bg-surface-container text-on-surface-variant text-sm transition-all" data-payment="银行转账" onclick="selectPayment(this, '银行转账')">银行转账</button>
          <button class="payment-btn px-4 py-2 rounded-full bg-surface-container text-on-surface-variant text-sm transition-all" data-payment="现金" onclick="selectPayment(this, '现金')">现金</button>
          <button class="payment-btn px-4 py-2 rounded-full bg-surface-container text-on-surface-variant text-sm transition-all" data-payment="公交卡" onclick="selectPayment(this, '公交卡')">公交卡</button>
          <button class="payment-btn px-4 py-2 rounded-full bg-surface-container text-on-surface-variant text-sm transition-all" data-payment="医保卡" onclick="selectPayment(this, '医保卡')">医保卡</button>
          <button class="payment-btn px-4 py-2 rounded-full bg-surface-container text-on-surface-variant text-sm transition-all" data-payment="滴滴出行" onclick="selectPayment(this, '滴滴出行')">滴滴出行</button>
        </div>
      </div>

      <!-- 备注输入 -->
      <div class="mb-6">
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">edit_note</span>
          <input id="noteInput" type="text" placeholder="添加备注..." class="w-full pl-12 pr-4 py-3 bg-surface-container rounded-xl text-on-surface outline-none focus:ring-2 focus:ring-primary">
        </div>
      </div>

      <!-- 提交按钮 -->
      <button id="submitBtn" class="w-full bg-primary text-on-primary py-4 rounded-full font-semibold text-lg flex items-center justify-center gap-2 transition-all hover:opacity-90" onclick="submitRecord()">
        <span class="material-symbols-outlined">check</span>
        <span>保存</span>
      </button>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api';
    let authToken = localStorage.getItem('finance_token');

    let currentType = 'expense';
    let selectedCategory = null;
    let selectedPayment = null;
    let expenseCategories = [];
    let incomeCategories = [];

    let currentPage = 1;
    let totalPages = 1;
    let totalRecords = 0;
    let isLoading = false;

    // API请求
    async function apiRequest(url, options = {}) {
      const defaultOptions = {
        headers: { 'Content-Type': 'application/json' },
      };
      if (authToken) {
        defaultOptions.headers['Authorization'] = `Bearer ${authToken}`;
      }
      const response = await fetch(url, { ...defaultOptions, ...options });
      const data = await response.json();
      if (!response.ok) throw new Error(data.message || '请求失败');
      return data;
    }

    // 格式化金额
    function formatAmount(amount) {
      return Math.abs(amount).toFixed(2);
    }

    // 格式化日期
    function formatDateCN(dateStr) {
      const date = new Date(dateStr);
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);

      if (date.toDateString() === today.toDateString()) return '今天';
      if (date.toDateString() === yesterday.toDateString()) return '昨天';
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    // 格式化时间
    function formatTime(dateStr) {
      const date = new Date(dateStr);
      return date.toTimeString().slice(0, 5);
    }

    // 获取分类列表
    async function loadCategories() {
      try {
        const result = await apiRequest(`${API_BASE}/transactions/categories`);
        if (result.code === 200) {
          expenseCategories = result.data.filter(c => c.type === 'expense');
          incomeCategories = result.data.filter(c => c.type === 'income');
          renderCategoryOptions();
          renderAddCategory();
        }
      } catch (error) {
        console.error('获取分类失败:', error);
      }
    }

    // 渲染分类选项到筛选下拉
    function renderCategoryOptions() {
      const filterCategory = document.getElementById('filterCategory');
      const allCategories = [...expenseCategories, ...incomeCategories];
      filterCategory.innerHTML = '<option value="">全部分类</option>' +
        allCategories.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
    }

    // 渲染添加记账的分类
    function renderAddCategory() {
      const categoryGrid = document.getElementById('categoryGrid');
      const cats = currentType === 'expense' ? expenseCategories : incomeCategories;
      categoryGrid.innerHTML = cats.map(cat => `
        <button class="category-btn flex flex-col items-center gap-1 p-3 rounded-xl bg-surface-container transition-all" data-category-id="${cat.id}" onclick="selectAddCategory(this, '${cat.id}')">
          <span class="text-2xl">${cat.icon}</span>
          <span class="text-xs">${cat.name}</span>
        </button>
      `).join('');
    }

    // 加载记录
    async function loadRecords(page = 1) {
      if (isLoading) return;
      isLoading = true;

      const keyword = document.getElementById('searchKeyword').value.trim();
      const type = document.getElementById('filterType').value;
      const categoryId = document.getElementById('filterCategory').value;
      const startDate = document.getElementById('filterStartDate').value;
      const endDate = document.getElementById('filterEndDate').value;

      let url = `${API_BASE}/transactions?page=${page}`;
      if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
      if (type) url += `&type=${type}`;
      if (categoryId) url += `&categoryId=${categoryId}`;
      if (startDate) url += `&startDate=${startDate}`;
      if (endDate) url += `&endDate=${endDate}`;

      try {
        const result = await apiRequest(url);
        if (result.code === 200) {
          currentPage = result.data.pagination.currentPage;
          totalPages = result.data.pagination.totalPages;
          totalRecords = result.data.pagination.total;

          renderRecords(result.data.records);
          renderPagination();

          // 滚动到顶部
          document.getElementById('recordsContainer').scrollTop = 0;
        }
      } catch (error) {
        console.error('获取记录失败:', error);
        document.getElementById('recordsList').innerHTML = '<div class="text-center py-8 text-red-500">加载失败</div>';
      } finally {
        isLoading = false;
      }
    }

    // 渲染记录列表
    function renderRecords(records) {
      if (records.length === 0) {
        document.getElementById('recordsList').innerHTML = '<div class="text-center py-8 text-on-surface-variant">暂无记录</div>';
        return;
      }

      // 按日期分组
      const grouped = {};
      records.forEach(record => {
        const dateKey = record.transactionDate;
        if (!grouped[dateKey]) {
          grouped[dateKey] = [];
        }
        grouped[dateKey].push(record);
      });

      let html = '';
      Object.keys(grouped).sort((a, b) => new Date(b) - new Date(a)).forEach(date => {
        const dayRecords = grouped[date];
        const dayTotal = dayRecords.reduce((sum, r) => {
          return sum + (r.type === 'expense' ? Math.abs(r.amount) : 0);
        }, 0);

        html += `
          <div>
            <div class="flex justify-between items-center mb-4 sticky top-0 bg-surface-container-lowest/80 backdrop-blur-md py-2 z-10">
              <h2 class="text-lg font-semibold text-on-surface">${formatDateCN(date)}</h2>
              <span class="text-xs text-on-surface-variant">支出: -¥${formatAmount(dayTotal)}</span>
            </div>
            <div class="space-y-3">
              ${dayRecords.map(record => `
                <div class="bg-white p-4 rounded-xl flex items-center justify-between hover:shadow-md transition-all cursor-pointer">
                  <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center" style="background-color: ${record.category.color}20">
                      <span class="text-xl">${record.category.icon}</span>
                    </div>
                    <div>
                      <div class="font-medium text-on-surface">${record.note || record.category.name}</div>
                      <div class="text-sm text-on-surface-variant">${record.category.name} • ${formatTime(record.createdAt)}</div>
                    </div>
                  </div>
                  <div class="text-xl font-bold ${record.type === 'expense' ? 'text-red-500' : 'text-green-500'}">
                    ${record.type === 'expense' ? '-' : '+'}¥${formatAmount(record.amount)}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      });

      document.getElementById('recordsList').innerHTML = html;
    }

    // 渲染分页
    function renderPagination() {
      const pagination = document.getElementById('pagination');
      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }

      let html = '';

      // 上一页
      if (currentPage > 1) {
        html += `<button onclick="goToPage(${currentPage - 1})" class="w-10 h-10 flex items-center justify-center rounded-full bg-white text-primary shadow-md hover:bg-primary hover:text-white transition-all">
          <span class="material-symbols-outlined text-sm">chevron_left</span>
        </button>`;
      }

      // 页码
      const maxVisible = 5;
      let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
      let endPage = Math.min(totalPages, startPage + maxVisible - 1);
      if (endPage - startPage < maxVisible - 1) {
        startPage = Math.max(1, endPage - maxVisible + 1);
      }

      if (startPage > 1) {
        html += `<button onclick="goToPage(1)" class="w-10 h-10 flex items-center justify-center rounded-full bg-white text-primary shadow-md hover:bg-primary hover:text-white transition-all">1</button>`;
        if (startPage > 2) html += `<span class="text-on-surface-variant px-2">...</span>`;
      }

      for (let i = startPage; i <= endPage; i++) {
        const isActive = i === currentPage;
        html += `<button onclick="goToPage(${i})" class="w-10 h-10 flex items-center justify-center rounded-full ${isActive ? 'bg-primary text-white' : 'bg-white text-primary'} shadow-md hover:bg-primary hover:text-white transition-all">${i}</button>`;
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) html += `<span class="text-on-surface-variant px-2">...</span>`;
        html += `<button onclick="goToPage(${totalPages})" class="w-10 h-10 flex items-center justify-center rounded-full bg-white text-primary shadow-md hover:bg-primary hover:text-white transition-all">${totalPages}</button>`;
      }

      // 下一页
      if (currentPage < totalPages) {
        html += `<button onclick="goToPage(${currentPage + 1})" class="w-10 h-10 flex items-center justify-center rounded-full bg-white text-primary shadow-md hover:bg-primary hover:text-white transition-all">
          <span class="material-symbols-outlined text-sm">chevron_right</span>
        </button>`;
      }

      pagination.innerHTML = html;
    }

    // 跳转到指定页
    function goToPage(page) {
      loadRecords(page);
    }

    // 搜索（防抖）
    let searchTimeout;
    function handleSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        loadRecords(1);
      }, 300);
    }

    // 切换筛选显示
    function toggleFilter() {
      const filterSection = document.getElementById('filterSection');
      filterSection.classList.toggle('hidden');
    }

    // 重置筛选
    function resetFilter() {
      document.getElementById('searchKeyword').value = '';
      document.getElementById('filterType').value = '';
      document.getElementById('filterCategory').value = '';
      document.getElementById('filterStartDate').value = '';
      document.getElementById('filterEndDate').value = '';
      loadRecords(1);
    }

    // 显示添加弹窗
    function showAddModal() {
      document.getElementById('addModal').classList.remove('hidden');
      resetAddForm();
    }

    // 隐藏添加弹窗
    function hideAddModal() {
      document.getElementById('addModal').classList.add('hidden');
    }

    // 重置添加表单
    function resetAddForm() {
      document.getElementById('amountInput').value = '';
      document.getElementById('noteInput').value = '';
      selectedCategory = null;
      selectedPayment = null;
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.remove('ring-2', 'ring-primary', 'bg-primary-container');
      });
      document.querySelectorAll('.payment-btn').forEach(btn => {
        btn.classList.remove('ring-2', 'ring-primary', 'bg-primary-container');
      });
    }

    // 切换记账类型
    function switchTab(type) {
      currentType = type;
      const tabExpense = document.getElementById('tabExpense');
      const tabIncome = document.getElementById('tabIncome');
      const paymentSection = document.getElementById('paymentSection');

      if (type === 'expense') {
        tabExpense.className = 'flex-1 py-3 rounded-full font-semibold bg-primary text-on-primary transition-all';
        tabIncome.className = 'flex-1 py-3 rounded-full font-semibold bg-surface-container text-on-surface-variant transition-all';
        paymentSection.classList.remove('hidden');
      } else {
        tabIncome.className = 'flex-1 py-3 rounded-full font-semibold bg-primary text-on-primary transition-all';
        tabExpense.className = 'flex-1 py-3 rounded-full font-semibold bg-surface-container text-on-surface-variant transition-all';
        paymentSection.classList.add('hidden');
        selectedPayment = null;
      }
      selectedCategory = null;
      renderAddCategory();
    }

    // 选择分类
    function selectAddCategory(btn, categoryId) {
      document.querySelectorAll('.category-btn').forEach(b => {
        b.classList.remove('ring-2', 'ring-primary', 'bg-primary-container');
      });
      btn.classList.add('ring-2', 'ring-primary', 'bg-primary-container');
      selectedCategory = categoryId;
    }

    // 选择支付方式
    function selectPayment(btn, payment) {
      document.querySelectorAll('.payment-btn').forEach(b => {
        b.classList.remove('ring-2', 'ring-primary', 'bg-primary-container');
      });
      btn.classList.add('ring-2', 'ring-primary', 'bg-primary-container');
      selectedPayment = payment;
    }

    // 提交记录
    async function submitRecord() {
      const amount = parseFloat(document.getElementById('amountInput').value);
      const note = document.getElementById('noteInput').value.trim();

      if (!amount || amount <= 0) {
        alert('请输入有效金额');
        return;
      }
      if (!selectedCategory) {
        alert('请选择分类');
        return;
      }
      if (currentType === 'expense' && !selectedPayment) {
        alert('请选择支付方式');
        return;
      }

      try {
        const result = await apiRequest(`${API_BASE}/transactions`, {
          method: 'POST',
          body: JSON.stringify({
            type: currentType,
            categoryId: parseInt(selectedCategory),
            amount: amount,
            note: note,
            paymentMethod: currentType === 'expense' ? selectedPayment : ''
          })
        });

        if (result.code === 200) {
          alert('添加成功！');
          hideAddModal();
          loadRecords(1);
        } else {
          alert(result.message || '添加失败');
        }
      } catch (error) {
        console.error('添加记录失败:', error);
        alert('添加失败，请稍后重试');
      }
    }

    // 滚动监听（用于分页同步）
    document.getElementById('recordsContainer').addEventListener('scroll', function() {
      const container = this;
      if (container.scrollTop === 0 && currentPage > 1) {
        // 滚动到顶部且不是第一页，加载上一页
        goToPage(currentPage - 1);
      }
    });

    // 页面加载
    document.addEventListener('DOMContentLoaded', async () => {
      if (!authToken) {
        alert('请先登录');
        window.location.href = 'login.html';
        return;
      }

      await loadCategories();
      loadRecords(1);
    });
  </script>
</body>
</html>
