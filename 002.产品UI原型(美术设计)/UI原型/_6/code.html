<!-- Micro-interaction script -->
<script>
        // Simple input focus effects and validation visual cues
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.02]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.02]');
            });
        });

        // Floating particle effect for the "Soft Bloom" narrative
        const createParticle = () => {
            const particle = document.createElement('div');
            const size = Math.random() * 20 + 10;
            particle.className = 'fixed pointer-events-none opacity-10 rounded-full bg-primary-container';
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;
            particle.style.filter = 'blur(10px)';
            document.body.appendChild(particle);

            const animation = particle.animate([
                { transform: 'translate(0, 0)', opacity: 0 },
                { opacity: 0.15, offset: 0.5 },
                { transform: `translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px)`, opacity: 0 }
            ], {
                duration: Math.random() * 5000 + 5000,
                iterations: Infinity
            });
        };

        for (let i = 0; i < 8; i++) createParticle();
    </script>
