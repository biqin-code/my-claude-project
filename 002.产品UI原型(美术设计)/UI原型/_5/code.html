<main class="w-full max-w-md z-10">

<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] transition-colors group-focus-within:text-primary">person</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-outline-variant" id="username" name="username" placeholder="请输入您的用户名" type="text"/>
</div>
</div>
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center px-base">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">密码</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">忘记密码？</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] transition-colors group-focus-within:text-primary">lock</span>
<input class="w-full pl-12 pr-12 py-3.5 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-outline-variant" id="password" name="password" placeholder="请输入您的登录密码" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-xs px-base mt-xs">
<input class="w-4 h-4 text-primary border-outline rounded focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">记住登录状态</label>
</div>
<button class="mt-md w-full font-headline-md text-headline-md py-3.5 rounded-lg shadow-sm hover:brightness-105 active:scale-[0.98] transition-all duration-150 flex justify-center items-center gap-xs bg-primary text-on-primary" type="submit">
                    登录
                    <span class="material-symbols-outlined text-[22px]">login</span>

<div class="relative flex items-center mb-lg">

</div>

</main>
<script>
        // Micro-interaction for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('ring-2', 'ring-primary/20');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('ring-2', 'ring-primary/20');
            });
        });

        // Simple visibility toggle for password
        const passwordBtn = document.querySelector('button[type="button"]');
        const passwordInput = document.getElementById('password');
        const visibilityIcon = passwordBtn.querySelector('span');

        passwordBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility';
            }
        });
    </script>
